<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="25%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#061e38" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030a14" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bg2" cx="75%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#08223a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c6ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00c6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c6ff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00c6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00c6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00c6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00c6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="220" fill="#030a14"/>
  <rect width="900" height="220" fill="url(#bg1)"/>
  <rect width="900" height="220" fill="url(#bg2)"/>

  <!-- Ambient center glow -->
  <ellipse cx="450" cy="110" rx="380" ry="120" fill="url(#glow1)"/>

  <!-- Grid lines horizontal - subtle -->
  <g stroke="#00c6ff" stroke-width="0.3" stroke-opacity="0.06">
    <line x1="0" y1="44"  x2="900" y2="44"/>
    <line x1="0" y1="88"  x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
  </g>
  <!-- Grid lines vertical - subtle -->
  <g stroke="#00c6ff" stroke-width="0.3" stroke-opacity="0.06">
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- Decorative dots at grid intersections -->
  <g fill="#00c6ff" fill-opacity="0.12">
    <circle cx="150" cy="44"  r="1.5"/>
    <circle cx="300" cy="44"  r="1.5"/>
    <circle cx="450" cy="44"  r="1.5"/>
    <circle cx="600" cy="44"  r="1.5"/>
    <circle cx="750" cy="44"  r="1.5"/>
    <circle cx="150" cy="88"  r="1.5"/>
    <circle cx="300" cy="88"  r="1.5"/>
    <circle cx="450" cy="88"  r="1.5"/>
    <circle cx="600" cy="88"  r="1.5"/>
    <circle cx="750" cy="88"  r="1.5"/>
    <circle cx="150" cy="132" r="1.5"/>
    <circle cx="300" cy="132" r="1.5"/>
    <circle cx="450" cy="132" r="1.5"/>
    <circle cx="600" cy="132" r="1.5"/>
    <circle cx="750" cy="132" r="1.5"/>
    <circle cx="150" cy="176" r="1.5"/>
    <circle cx="300" cy="176" r="1.5"/>
    <circle cx="450" cy="176" r="1.5"/>
    <circle cx="600" cy="176" r="1.5"/>
    <circle cx="750" cy="176" r="1.5"/>
  </g>

  <!-- Corner bracket TL -->
  <g stroke="#00c6ff" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-opacity="0.6">
    <polyline points="18,42 18,18 42,18"/>
  </g>
  <!-- Corner bracket TR -->
  <g stroke="#00c6ff" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-opacity="0.6">
    <polyline points="858,18 882,18 882,42"/>
  </g>
  <!-- Corner bracket BL -->
  <g stroke="#00c6ff" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-opacity="0.6">
    <polyline points="18,178 18,202 42,202"/>
  </g>
  <!-- Corner bracket BR -->
  <g stroke="#00c6ff" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-opacity="0.6">
    <polyline points="858,202 882,202 882,178"/>
  </g>

  <!-- Small accent dots at corners -->
  <circle cx="18" cy="18" r="2.5" fill="#00c6ff" fill-opacity="0.5"/>
  <circle cx="882" cy="18" r="2.5" fill="#00c6ff" fill-opacity="0.5"/>
  <circle cx="18" cy="202" r="2.5" fill="#00c6ff" fill-opacity="0.5"/>
  <circle cx="882" cy="202" r="2.5" fill="#00c6ff" fill-opacity="0.5"/>

  <!-- Left side vertical accent bar -->
  <rect x="32" y="55" width="2" height="110" fill="#00c6ff" fill-opacity="0.18" rx="1"/>
  <!-- Right side vertical accent bar -->
  <rect x="866" y="55" width="2" height="110" fill="#00c6ff" fill-opacity="0.18" rx="1"/>

  <!-- Animated scanning line -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.7">
    <animateTransform attributeName="transform" type="translate"
      from="0 0" to="0 220" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Horizontal glowing separator line below name -->
  <line x1="200" y1="155" x2="700" y2="155" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- Blinking cursor-style decoration left of name -->
  <rect x="195" y="72" width="3" height="42" fill="#00c6ff" rx="1" fill-opacity="0.9">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- MAIN NAME -->
  <text x="450" y="118" text-anchor="middle"
    font-family="Arial Black,Arial,sans-serif"
    font-size="54" font-weight="900"
    letter-spacing="-1"
    fill="#00c6ff">Abdul Hanan Saqlain</text>

  <!-- NAME subtle glow layer -->
  <text x="450" y="118" text-anchor="middle"
    font-family="Arial Black,Arial,sans-serif"
    font-size="54" font-weight="900"
    letter-spacing="-1"
    fill="#00c6ff" fill-opacity="0.18"
    style="filter:blur(8px)">Abdul Hanan Saqlain</text>

  <!-- SUBTITLE -->
  <text x="450" y="148" text-anchor="middle"
    font-family="Arial,sans-serif"
    font-size="16" font-weight="400"
    letter-spacing="1.5"
    fill="#4a9abb">AI Engineer  |  Builder  |  Innovator</text>

  <!-- Animated pulsing dot left of subtitle -->
  <circle cx="224" cy="143" r="3.5" fill="#00e87a">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;4.5;3.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Tech tag bottom left -->
  <rect x="32" y="185" width="100" height="20" rx="4" fill="#00c6ff" fill-opacity="0.08" stroke="#00c6ff" stroke-width="0.6" stroke-opacity="0.3"/>
  <text x="82" y="199" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="10" letter-spacing="1.5"
    fill="#00c6ff" fill-opacity="0.6">AI_ENGINEER</text>

  <!-- Tech tag bottom right -->
  <rect x="768" y="185" width="100" height="20" rx="4" fill="#00c6ff" fill-opacity="0.08" stroke="#00c6ff" stroke-width="0.6" stroke-opacity="0.3"/>
  <text x="818" y="199" text-anchor="middle"
    font-family="'Courier New',Courier,monospace" font-size="10" letter-spacing="1.5"
    fill="#4ecb71" fill-opacity="0.7">v2.0.25</text>

  <!-- Wave bottom edge -->
  <path d="M0,210 Q225,195 450,210 Q675,225 900,210 L900,220 L0,220 Z"
    fill="#030a14" opacity="0.8"/>
</svg>
