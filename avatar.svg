<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbG" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#0e2a42"/>
      <stop offset="60%"  stop-color="#05111f"/>
      <stop offset="100%" stop-color="#020c18"/>
    </radialGradient>
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dark bg so it looks right on any page -->
  <rect width="320" height="320" fill="#030a14" rx="16"/>

  <!-- halo -->
  <circle cx="160" cy="160" r="152" fill="url(#haloG)"/>

  <!-- major tick marks every 30° -->
  <g stroke="#00d4ff" stroke-width="1.1" stroke-opacity="0.5" stroke-linecap="round">
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(0   160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(30  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(60  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(90  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(120 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(150 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(180 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(210 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(240 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(270 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(300 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="22" transform="rotate(330 160 160)"/>
  </g>

  <!-- minor tick marks every 10° -->
  <g stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.2" stroke-linecap="round">
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(10  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(20  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(40  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(50  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(70  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(80  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(100 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(110 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(130 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(140 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(160 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(170 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(190 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(200 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(220 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(230 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(250 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(260 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(280 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(290 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(310 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(320 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(340 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="16" transform="rotate(350 160 160)"/>
  </g>

  <!-- Ring 5 — outer static guide -->
  <circle cx="160" cy="160" r="148" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Ring 5 — animated cyan dashed -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="#00d4ff"
    stroke-width="1.4" stroke-dasharray="32 16" stroke-linecap="round" stroke-opacity="0.55">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 4 — purple counter-clockwise -->
  <circle cx="160" cy="160" r="122" fill="none" stroke="#8050ee"
    stroke-width="1.3" stroke-dasharray="20 26" stroke-linecap="round" stroke-opacity="0.65">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="-360 160 160" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 3 — cyan medium -->
  <circle cx="160" cy="160" r="104" fill="none" stroke="#00d4ff"
    stroke-width="1" stroke-dasharray="14 18" stroke-linecap="round" stroke-opacity="0.4">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 2 — inner fine dashed -->
  <circle cx="160" cy="160" r="88" fill="none" stroke="#00d4ff"
    stroke-width="0.7" stroke-dasharray="8 14" stroke-linecap="round" stroke-opacity="0.3">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="-360 160 160" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 1 — innermost -->
  <circle cx="160" cy="160" r="74" fill="none" stroke="#5060ff"
    stroke-width="0.5" stroke-dasharray="5 12" stroke-linecap="round" stroke-opacity="0.25">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot cyan on ring5 -->
  <circle cx="300" cy="160" r="4.5" fill="#00d4ff">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot purple on ring4 -->
  <circle cx="282" cy="160" r="3.5" fill="#a060ff">
    <animateTransform attributeName="transform" type="rotate"
      from="100 160 160" to="-260 160 160" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot green on ring3 -->
  <circle cx="264" cy="160" r="3" fill="#4ecb71">
    <animateTransform attributeName="transform" type="rotate"
      from="200 160 160" to="560 160 160" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot small cyan on ring2 -->
  <circle cx="248" cy="160" r="2.2" fill="#00d4ff">
    <animateTransform attributeName="transform" type="rotate"
      from="50 160 160" to="-310 160 160" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Core orb -->
  <circle cx="160" cy="160" r="60" fill="url(#orbG)"
    stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.32"/>

  <!-- Glass shine (no filter needed) -->
  <ellipse cx="147" cy="140" rx="20" ry="10" fill="white" fill-opacity="0.06"
    transform="rotate(-22 147 140)"/>

  <!-- Hex grid inside orb -->
  <g stroke="#00d4ff" stroke-width="0.45" fill="none" stroke-opacity="0.15">
    <polygon points="160,118 172,125 172,139 160,146 148,139 148,125"/>
    <polygon points="160,146 172,153 172,167 160,174 148,167 148,153"/>
    <polygon points="148,125 160,132 160,146 148,153 136,146 136,132"/>
    <polygon points="172,125 184,132 184,146 172,153 160,146 160,132"/>
  </g>

  <!-- Initials — bold, no filter -->
  <text x="160" y="171" text-anchor="middle" fill="#00d4ff"
    font-family="Arial,sans-serif" font-size="30" font-weight="700"
    letter-spacing="5">AH</text>

  <!-- Pulse wave -->
  <circle cx="160" cy="160" r="60" fill="none" stroke="#00d4ff" stroke-width="1.5">
    <animate attributeName="r" values="60;76;60" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.35;0;0.35" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Data tag top: AI_ENGINEER -->
  <text x="160" y="52" text-anchor="middle" fill="#00d4ff"
    font-family="'Courier New',Courier,monospace" font-size="11" letter-spacing="2.5">
    <animate attributeName="opacity" values="0;1;1;0;0"
      keyTimes="0;0.1;0.5;0.65;1" dur="5s" repeatCount="indefinite"/>
    AI_ENGINEER
  </text>

  <!-- Data tag bottom: v2.0.25 -->
  <text x="160" y="278" text-anchor="middle" fill="#4ecb71"
    font-family="'Courier New',Courier,monospace" font-size="11" letter-spacing="2.5">
    <animate attributeName="opacity" values="0;0;1;1;0"
      keyTimes="0;0.3;0.45;0.75;1" dur="5s" repeatCount="indefinite" begin="1.5s"/>
    v2.0.25
  </text>

  <!-- Data tag left: BUILDER -->
  <text x="30" y="160" text-anchor="middle" fill="#a060ff"
    font-family="'Courier New',Courier,monospace" font-size="10" letter-spacing="3"
    transform="rotate(-90 30 160)">
    <animate attributeName="opacity" values="0;0;1;1;0"
      keyTimes="0;0.5;0.6;0.85;1" dur="5s" repeatCount="indefinite" begin="2.8s"/>
    BUILDER
  </text>

  <!-- Corner bracket accents -->
  <g stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" fill="none">
    <polyline points="22,36 22,22 36,22" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="284,22 298,22 298,36" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    </polyline>
    <polyline points="298,284 298,298 284,298" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
    </polyline>
    <polyline points="36,298 22,298 22,284" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="1.8s"/>
    </polyline>
  </g>
</svg>
