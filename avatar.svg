<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbG" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#0e2a42"/>
      <stop offset="60%" stop-color="#05111f"/>
      <stop offset="100%" stop-color="#020c18"/>
    </radialGradient>
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a060ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a060ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ecb71" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4ecb71" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="320" fill="#030a14" rx="20"/>

  <!-- Outer ambient halo -->
  <circle cx="160" cy="160" r="152" fill="url(#haloG)"/>

  <!-- Second ambient ring -->
  <circle cx="160" cy="160" r="130" fill="none" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Major tick marks every 30deg -->
  <g stroke="#00d4ff" stroke-width="1.1" stroke-opacity="0.55" stroke-linecap="round">
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(0   160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(30  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(60  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(90  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(120 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(150 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(180 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(210 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(240 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(270 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(300 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="24" transform="rotate(330 160 160)"/>
  </g>

  <!-- Minor tick marks every 10deg -->
  <g stroke="#00d4ff" stroke-width="0.55" stroke-opacity="0.22" stroke-linecap="round">
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(10  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(20  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(40  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(50  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(70  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(80  160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(100 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(110 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(130 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(140 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(160 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(170 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(190 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(200 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(220 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(230 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(250 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(260 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(280 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(290 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(310 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(320 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(340 160 160)"/>
    <line x1="160" y1="10" x2="160" y2="17" transform="rotate(350 160 160)"/>
  </g>

  <!-- Static outer guide ring -->
  <circle cx="160" cy="160" r="148" fill="none" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- RING 5 outer animated cyan -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="#00d4ff"
    stroke-width="1.6" stroke-dasharray="34 14" stroke-linecap="round" stroke-opacity="0.6">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- RING 4 purple counter -->
  <circle cx="160" cy="160" r="122" fill="none" stroke="#9050ee"
    stroke-width="1.4" stroke-dasharray="22 24" stroke-linecap="round" stroke-opacity="0.7">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="-360 160 160" dur="15s" repeatCount="indefinite"/>
  </circle>

  <!-- RING 3 cyan medium -->
  <circle cx="160" cy="160" r="104" fill="none" stroke="#00d4ff"
    stroke-width="1" stroke-dasharray="15 17" stroke-linecap="round" stroke-opacity="0.45">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- RING 2 inner fine -->
  <circle cx="160" cy="160" r="88" fill="none" stroke="#00d4ff"
    stroke-width="0.8" stroke-dasharray="8 13" stroke-linecap="round" stroke-opacity="0.32">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="-360 160 160" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- RING 1 innermost -->
  <circle cx="160" cy="160" r="74" fill="none" stroke="#5060ff"
    stroke-width="0.6" stroke-dasharray="5 11" stroke-linecap="round" stroke-opacity="0.28">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- DOT cyan on ring5 with glow halo -->
  <circle cx="300" cy="160" r="10" fill="url(#dotGlow1)" fill-opacity="0.4">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="160" r="4.5" fill="#00d4ff">
    <animateTransform attributeName="transform" type="rotate"
      from="0 160 160" to="360 160 160" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- DOT purple on ring4 with glow halo -->
  <circle cx="282" cy="160" r="8" fill="url(#dotGlow2)" fill-opacity="0.4">
    <animateTransform attributeName="transform" type="rotate"
      from="110 160 160" to="-250 160 160" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="282" cy="160" r="3.5" fill="#b060ff">
    <animateTransform attributeName="transform" type="rotate"
      from="110 160 160" to="-250 160 160" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="15s" repeatCount="indefinite"/>
  </circle>

  <!-- DOT green on ring3 with glow halo -->
  <circle cx="264" cy="160" r="7" fill="url(#dotGlow3)" fill-opacity="0.4">
    <animateTransform attributeName="transform" type="rotate"
      from="210 160 160" to="570 160 160" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="264" cy="160" r="3" fill="#4ecb71">
    <animateTransform attributeName="transform" type="rotate"
      from="210 160 160" to="570 160 160" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- DOT small cyan ring2 -->
  <circle cx="248" cy="160" r="2.2" fill="#00d4ff">
    <animateTransform attributeName="transform" type="rotate"
      from="55 160 160" to="-305 160 160" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- CORE ORB -->
  <circle cx="160" cy="160" r="60" fill="url(#orbG)"
    stroke="#00d4ff" stroke-width="1.4" stroke-opacity="0.35"/>

  <!-- Orb inner ring detail -->
  <circle cx="160" cy="160" r="54" fill="none"
    stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Glass shine -->
  <ellipse cx="146" cy="139" rx="21" ry="11" fill="white" fill-opacity="0.07"
    transform="rotate(-22 146 139)"/>

  <!-- Hex grid inside orb -->
  <g stroke="#00d4ff" stroke-width="0.5" fill="none" stroke-opacity="0.18">
    <polygon points="160,118 172,125 172,139 160,146 148,139 148,125"/>
    <polygon points="160,146 172,153 172,167 160,174 148,167 148,153"/>
    <polygon points="148,125 160,132 160,146 148,153 136,146 136,132"/>
    <polygon points="172,125 184,132 184,146 172,153 160,146 160,132"/>
  </g>

  <!-- INITIALS -->
  <text x="160" y="171" text-anchor="middle" fill="#00d4ff"
    font-family="Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="6">AH</text>

  <!-- PULSE WAVE 1 -->
  <circle cx="160" cy="160" r="60" fill="none" stroke="#00d4ff" stroke-width="1.8">
    <animate attributeName="r" values="60;80;60" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;0;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- PULSE WAVE 2 (offset) -->
  <circle cx="160" cy="160" r="60" fill="none" stroke="#00d4ff" stroke-width="1">
    <animate attributeName="r" values="60;80;60" dur="3.5s" begin="1.75s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.25;0;0.25" dur="3.5s" begin="1.75s" repeatCount="indefinite"/>
  </circle>

  <!-- DATA TAG: AI_ENGINEER top -->
  <text x="160" y="50" text-anchor="middle" fill="#00d4ff"
    font-family="'Courier New',Courier,monospace" font-size="11" letter-spacing="2.8" font-weight="500">
    <animate attributeName="opacity" values="0;0;1;1;1;0;0"
      keyTimes="0;0.05;0.15;0.45;0.55;0.65;1" dur="6s" repeatCount="indefinite"/>
    AI_ENGINEER
  </text>
  <!-- tag underline -->
  <line x1="108" y1="54" x2="212" y2="54" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0;0.4;0.4;0.4;0;0"
      keyTimes="0;0.05;0.15;0.45;0.55;0.65;1" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- DATA TAG: v2.0.25 bottom -->
  <text x="160" y="278" text-anchor="middle" fill="#4ecb71"
    font-family="'Courier New',Courier,monospace" font-size="11" letter-spacing="2.8" font-weight="500">
    <animate attributeName="opacity" values="0;0;0;1;1;0;0"
      keyTimes="0;0.25;0.35;0.45;0.7;0.8;1" dur="6s" repeatCount="indefinite" begin="1s"/>
    v2.0.25
  </text>
  <line x1="122" y1="282" x2="198" y2="282" stroke="#4ecb71" stroke-width="0.6" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0;0;0.4;0.4;0;0"
      keyTimes="0;0.25;0.35;0.45;0.7;0.8;1" dur="6s" repeatCount="indefinite" begin="1s"/>
  </line>

  <!-- DATA TAG: BUILDER left vertical -->
  <text x="30" y="160" text-anchor="middle" fill="#b060ff"
    font-family="'Courier New',Courier,monospace" font-size="10" letter-spacing="3"
    transform="rotate(-90 30 160)">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0"
      keyTimes="0;0.4;0.5;0.58;0.65;0.85;1" dur="6s" repeatCount="indefinite" begin="2s"/>
    BUILDER
  </text>

  <!-- CORNER BRACKETS -->
  <g stroke="#00d4ff" stroke-width="1.4" stroke-linecap="round" fill="none">
    <!-- TL -->
    <polyline points="22,38 22,22 38,22">
      <animate attributeName="stroke-opacity" values="0.25;0.75;0.25" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <!-- TR -->
    <polyline points="282,22 298,22 298,38">
      <animate attributeName="stroke-opacity" values="0.25;0.75;0.25" dur="3s" repeatCount="indefinite" begin="0.75s"/>
    </polyline>
    <!-- BR -->
    <polyline points="298,282 298,298 282,298">
      <animate attributeName="stroke-opacity" values="0.25;0.75;0.25" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </polyline>
    <!-- BL -->
    <polyline points="38,298 22,298 22,282">
      <animate attributeName="stroke-opacity" values="0.25;0.75;0.25" dur="3s" repeatCount="indefinite" begin="2.25s"/>
    </polyline>
  </g>

  <!-- Cross-hair marks at 90deg positions -->
  <g stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round">
    <line x1="155" y1="10" x2="165" y2="10"/>
    <line x1="310" y1="155" x2="310" y2="165"/>
    <line x1="155" y1="310" x2="165" y2="310"/>
    <line x1="10"  y1="155" x2="10"  y2="165"/>
  </g>
</svg>
